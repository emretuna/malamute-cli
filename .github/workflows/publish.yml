# Publish workflow. Runs on:
#   1. Push of a tag matching v* (e.g., v0.1.1)
#   2. Manual trigger from the Actions tab (workflow_dispatch)
#
# To cut a release locally:
#   npm version patch     # or minor / major
#   git push --follow-tags
#
# Required secrets:
#   NPM_TOKEN  — npm AUTOMATION token, https://www.npmjs.com/settings/tokens
#
# Common failure mode: the publish step exits with `EOTP — This operation
# requires a one-time password`. This means your npm account's 2FA mode is
# set to "authorization-and-publishing", which forces every publish through
# 2FA — including via Automation tokens. Switch the account 2FA mode to
# "automation-and-publishing" at https://www.npmjs.com/settings to allow CI
# to publish without prompting for an OTP. See CONTRIBUTING.md for details.
#
# This is a SEPARATE workflow from ci.yml. ci.yml runs on every push and PR
# (lint, format, typecheck, test) but does NOT publish. To publish, push a
# tag — that's the only path that lands on npm.
name: publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Publish tarball summary
        run: npm pack --dry-run
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
